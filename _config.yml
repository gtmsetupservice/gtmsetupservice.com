# Site Settings
title: GTM Setup Service
description: Emergency GTM recovery and comprehensive tracking audits. Fix broken Google Tag Manager in 2-4 hours.
url: https://gtmsetupservice.com
baseurl: ""

# SEO Settings
tagline: Fix Your GTM Tracking Issues Today
author:
  name: GTM Setup Service
  email: support@gtmsetupservice.com

# Jekyll Configuration
markdown: kramdown
permalink: /blog/:title/
future: true

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  testimonials:
    output: false

# Defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "GTM Setup Service"

# Analytics
google_analytics: G-EL900BEWMS # GA4 Measurement ID
gtm_container: GTM-M3CR8QZP # GTM Container ID

# CRM Settings
crm_endpoint: # Your FluentCRM API endpoint
crm_api_key: # Your FluentCRM API key

# Service-specific settings
service_type: Google Tag Manager Setup and Audits
emergency_price: "$397"
audit_price: "$797"
monitoring_price: "$197/month"
